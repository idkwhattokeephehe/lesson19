<!--
1) Start the HTML document with `<!DOCTYPE html>` and set language as English using `<html lang="en">`.

2) Inside the `<head>` section:
   a) Set the page title using `<title>JavaScript Variables</title>`.
   b) Add `<meta charset="utf-8">` to support special characters.
   c) Add `<meta name="viewport" content="width=device-width, initial-scale=1">`
      to make the page responsive.

3) Inside the `<body>` section:

4) Add a main heading using `<h1>`:
   a) Text: "JavaScript Variables"

5) Add a paragraph `<p>` to describe the task:
   a) Text: "Sum of two Numbers"

6) Create an empty paragraph to display the output:
   a) Use `<p id="result"></p>`
   b) This is where the sum result will appear.

7) Add a `<script>` tag to write JavaScript code.

8) Inside the `<script>` tag:
   a) Create a variable `num1` and store a number in it.
   b) Create a variable `num2` and store a number in it.
   c) Create a variable `sum` and store the addition result: `num1 + num2`.

9) Display the output on the webpage:
   a) Use `document.getElementById("result")` to select the paragraph.
   b) Set `.innerHTML` to show this text:
      "The total sum is: " + sum

10) Close all tags properly:
    a) Close `</script>`, `</body>`, and `</html>`.
-->
<DOCTYPE html>
   <html lang="en">
      <head>
         <title>JavaScript Variables</title>
         <meta charset="utf-8">
         <meta name="viewport" content="width=device-width, initial-scale=1">
      </head>
      <body>
         <h1>JavaScript Variables</h1>
         <p>Sum of 2 numbers</p>
         <p id="result"></p>
         <script>
            var num1 = 10; // First number
            var num2 = 20; // Second number
            var sum = num1 + num2; // Calculate the sum
            document.getElementById("result").innerHTML = "The total sum is: " + sum; // Display the result
         </script>
      </body>
   </html>
