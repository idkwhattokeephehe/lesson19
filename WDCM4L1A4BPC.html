
<DOCTYPE html>
   <html>
      <body>
         <h2>Operators</h2>
         <p id="demo"></p>
         <script>
            //Addition
            //Javascript script supports operators like +, -, *, /
            var x = 5; // First number
            var y = 2; // Second number'
            var z = x + y; // Add x and y, store in z
            document.getElementById("demo").innerHTML = z; // Display the result
         </script>
      </body>
   </html>
